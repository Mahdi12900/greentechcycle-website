<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 60">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cycle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Icon mark scaled to 56px -->
  <g transform="translate(2, 2) scale(0.875)">
    <line x1="32" y1="0.5" x2="32" y2="4.5" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M32 4 L37 10 C45 10 56 16 56 28 C56 40 46 52 32 58 C18 52 8 40 8 28 C8 16 19 10 27 10 Z" fill="url(#shield)"/>
    <circle cx="32" cy="32" r="11" fill="none" stroke="url(#cycle)" stroke-width="2.8" stroke-dasharray="17.28 5.76" stroke-linecap="round" transform="rotate(-90, 32, 32)"/>
    <path d="M32 14 Q33.5 20 32 26" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark for dark backgrounds -->
  <text x="64" y="39" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" letter-spacing="0.3">
    <tspan fill="#10B981">Green</tspan><tspan fill="#60A5FA">Tech</tspan><tspan fill="#FFFFFF">Cycle</tspan>
  </text>
</svg>
