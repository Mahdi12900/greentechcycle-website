<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shield" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cycle" x1="21" y1="21" x2="43" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Leaf stem -->
  <line x1="32" y1="0.5" x2="32" y2="4.5" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shield-leaf body: shield silhouette with leaf-tip apex -->
  <path d="M32 4 L37 10 C45 10 56 16 56 28 C56 40 46 52 32 58 C18 52 8 40 8 28 C8 16 19 10 27 10 Z" fill="url(#shield)"/>
  <!-- Circular cycle: three arc segments suggesting perpetual motion -->
  <circle cx="32" cy="32" r="11" fill="none" stroke="url(#cycle)" stroke-width="2.8" stroke-dasharray="17.28 5.76" stroke-linecap="round" transform="rotate(-90, 32, 32)"/>
  <!-- Central leaf-vein accent reinforcing the botanical motif -->
  <path d="M32 14 Q33.5 20 32 26" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
