<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background radial gradient for depth -->
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="shield" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cycle" x1="21" y1="21" x2="43" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Subtle glow behind the icon -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="24" y="24" width="1152" height="582" rx="6" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Subtle accent lines -->
  <line x1="100" y1="540" x2="1100" y2="540" stroke="rgba(16,185,129,0.08)" stroke-width="1"/>

  <!-- Icon mark — centered, scaled to ~140px -->
  <g transform="translate(530, 160) scale(2.1875)" filter="url(#glow)">
    <line x1="32" y1="0.5" x2="32" y2="4.5" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M32 4 L37 10 C45 10 56 16 56 28 C56 40 46 52 32 58 C18 52 8 40 8 28 C8 16 19 10 27 10 Z" fill="url(#shield)"/>
    <circle cx="32" cy="32" r="11" fill="none" stroke="url(#cycle)" stroke-width="2.8" stroke-dasharray="17.28 5.76" stroke-linecap="round" transform="rotate(-90, 32, 32)"/>
    <path d="M32 14 Q33.5 20 32 26" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="405" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="1">
    <tspan fill="#10B981">Green</tspan><tspan fill="#60A5FA">Tech</tspan><tspan fill="#FFFFFF">Cycle</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" letter-spacing="4" fill="rgba(255,255,255,0.35)">SECURE ITAD · ESG COMPLIANCE · CIRCULAR ECONOMY</text>
</svg>
