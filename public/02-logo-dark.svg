<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orb1d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0"/>
      <stop offset="20%" stop-color="#34D399" stop-opacity="1"/>
      <stop offset="80%" stop-color="#34D399" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#38BDF8" stop-opacity="1"/>
      <stop offset="80%" stop-color="#38BDF8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb3d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FBBF24" stop-opacity="1"/>
      <stop offset="80%" stop-color="#FBBF24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nucleusD" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#065F46"/>
    </radialGradient>
  </defs>

  <rect width="680" height="400" fill="#0F172A"/>

  <g transform="translate(340,150)">
    <ellipse cx="0" cy="0" rx="110" ry="28" fill="none" stroke="url(#orb1d)" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="110" ry="28" fill="none" stroke="url(#orb2d)" stroke-width="2.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="110" ry="28" fill="none" stroke="url(#orb3d)" stroke-width="2.5" transform="rotate(-60)"/>

    <g transform="rotate(0)">
      <circle cx="110" cy="0" r="6" fill="#34D399"/>
      <circle cx="110" cy="0" r="12" fill="none" stroke="#34D399" stroke-width="1" opacity="0.3"/>
    </g>
    <g transform="rotate(60)">
      <circle cx="110" cy="0" r="6" fill="#38BDF8"/>
      <circle cx="110" cy="0" r="12" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.3"/>
    </g>
    <g transform="rotate(-60)">
      <circle cx="110" cy="0" r="6" fill="#FBBF24"/>
      <circle cx="110" cy="0" r="12" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.3"/>
    </g>

    <circle cx="0" cy="0" r="22" fill="#ECFDF5"/>
    <circle cx="0" cy="0" r="19" fill="url(#nucleusD)"/>
    <circle cx="-5" cy="-6" r="4" fill="#ECFDF5" opacity="0.9"/>
  </g>

  <text x="340" y="295" text-anchor="middle" font-family="Inter, 'Helvetica Neue', sans-serif"
        font-size="42" font-weight="700" fill="#F8FAFC" letter-spacing="-1.2">Green<tspan fill="#34D399">Tech</tspan>Cycle</text>

  <text x="340" y="322" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11" font-weight="400" fill="#94A3B8" letter-spacing="3">THE ENTERPRISE DECISION PLATFORM</text>

  <g transform="translate(340, 360)" font-family="Inter, 'Helvetica Neue', sans-serif"
     font-size="10" font-weight="500" fill="#CBD5E1" letter-spacing="1.5">
    <g transform="translate(-160, 0)">
      <rect x="0" y="-4" width="3" height="8" fill="#34D399"/>
      <text x="10" y="4">LIFECYCLE</text>
    </g>
    <g transform="translate(-30, 0)">
      <rect x="0" y="-4" width="3" height="8" fill="#38BDF8"/>
      <text x="10" y="4">CARBON IMPACT</text>
    </g>
    <g transform="translate(90, 0)">
      <rect x="0" y="-4" width="3" height="8" fill="#FBBF24"/>
      <text x="10" y="4">CYBER RISK</text>
    </g>
  </g>
</svg>
