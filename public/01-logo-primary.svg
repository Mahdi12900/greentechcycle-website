<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="20%" stop-color="#10B981" stop-opacity="1"/>
      <stop offset="80%" stop-color="#10B981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0EA5E9" stop-opacity="1"/>
      <stop offset="80%" stop-color="#0EA5E9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F59E0B" stop-opacity="1"/>
      <stop offset="80%" stop-color="#F59E0B" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nucleus" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </radialGradient>
  </defs>

  <g transform="translate(340,150)">
    <ellipse cx="0" cy="0" rx="110" ry="28" fill="none" stroke="url(#orb1)" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="110" ry="28" fill="none" stroke="url(#orb2)" stroke-width="2.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="110" ry="28" fill="none" stroke="url(#orb3)" stroke-width="2.5" transform="rotate(-60)"/>

    <g transform="rotate(0)">
      <circle cx="110" cy="0" r="6" fill="#10B981"/>
      <circle cx="110" cy="0" r="12" fill="none" stroke="#10B981" stroke-width="1" opacity="0.25"/>
    </g>
    <g transform="rotate(60)">
      <circle cx="110" cy="0" r="6" fill="#0EA5E9"/>
      <circle cx="110" cy="0" r="12" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.25"/>
    </g>
    <g transform="rotate(-60)">
      <circle cx="110" cy="0" r="6" fill="#F59E0B"/>
      <circle cx="110" cy="0" r="12" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.25"/>
    </g>

    <circle cx="0" cy="0" r="22" fill="#0F172A"/>
    <circle cx="0" cy="0" r="19" fill="url(#nucleus)"/>
    <circle cx="-5" cy="-6" r="4" fill="#ECFDF5" opacity="0.9"/>
  </g>

  <text x="340" y="295" text-anchor="middle" font-family="Inter, 'Helvetica Neue', sans-serif"
        font-size="42" font-weight="700" fill="#0F172A" letter-spacing="-1.2">Green<tspan fill="#10B981">Tech</tspan>Cycle</text>

  <text x="340" y="322" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11" font-weight="400" fill="#64748B" letter-spacing="3">THE ENTERPRISE DECISION PLATFORM</text>

  <g transform="translate(340, 360)" font-family="Inter, 'Helvetica Neue', sans-serif"
     font-size="10" font-weight="500" fill="#475569" letter-spacing="1.5">
    <g transform="translate(-160, 0)">
      <rect x="0" y="-4" width="3" height="8" fill="#10B981"/>
      <text x="10" y="4">LIFECYCLE</text>
    </g>
    <g transform="translate(-30, 0)">
      <rect x="0" y="-4" width="3" height="8" fill="#0EA5E9"/>
      <text x="10" y="4">CARBON IMPACT</text>
    </g>
    <g transform="translate(90, 0)">
      <rect x="0" y="-4" width="3" height="8" fill="#F59E0B"/>
      <text x="10" y="4">CYBER RISK</text>
    </g>
  </g>
</svg>
