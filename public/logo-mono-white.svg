<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 60">
  <!-- Monochrome white: line-art icon + white text — for dark/photographic backgrounds -->
  <g transform="translate(2, 2) scale(0.875)">
    <!-- Stem -->
    <line x1="32" y1="0.5" x2="32" y2="4.5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Shield-leaf outline -->
    <path d="M32 4 L37 10 C45 10 56 16 56 28 C56 40 46 52 32 58 C18 52 8 40 8 28 C8 16 19 10 27 10 Z" fill="none" stroke="#FFFFFF" stroke-width="2.4"/>
    <!-- Cycle arcs -->
    <circle cx="32" cy="32" r="11" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-dasharray="17.28 5.76" stroke-linecap="round" transform="rotate(-90, 32, 32)"/>
  </g>
  <!-- White wordmark -->
  <text x="64" y="39" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" letter-spacing="0.3" fill="#FFFFFF">GreenTechCycle</text>
</svg>
